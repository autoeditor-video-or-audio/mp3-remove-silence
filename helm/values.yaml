# values.yaml para apps-helm-chart (ApplicationSet)
# Usado com: valueFiles: - '$definitions/helm/values.yaml'
app: mp3-remove-silence
component: editaudiotomovie
version: v0.1.0

deployment:
  replicas: 1
  sendlogs: "true"
  containers:
    - name: mp3-remove-silence
      fixedNameImage: true
      image: ghcr.io/autoeditor-video-or-audio/mp3-remove-silence:v0.1.0
      ports:
        number: 8001
        name: http
      env:
        - name: TZ
          value: "America/Sao_Paulo"
        - name: AUTO_EDITOR_MARGIN
          value: "0.05sec,1sec"
        - name: PROCESS_TIMEOUT_SECONDS
          value: "300"
        - name: LOG_LEVEL
          value: "INFO"
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "6Gi"
          cpu: "6.0"
      livenessProbe:
        httpGet:
          path: /health
          port: 8001
        initialDelaySeconds: 10
        periodSeconds: 30
        timeoutSeconds: 10
      readinessProbe:
        httpGet:
          path: /health
          port: 8001
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 5
  affinity:
    - hosts:
      - name: k8s-03
    - hosts:
      - name: k8s-04

service:
  - type: ClusterIP
    ports:
      - port: 80
        targetPort: 8001
        protocol: TCP
        name: http
