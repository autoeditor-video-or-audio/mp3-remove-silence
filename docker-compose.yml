services:
  mp3-remove-silence:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8001:8001"
    volumes:
      - ./app:/app/app
    environment:
      - AUTO_EDITOR_MARGIN=0.04sec
      - PROCESS_TIMEOUT_SECONDS=300
      - LOG_LEVEL=INFO
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
