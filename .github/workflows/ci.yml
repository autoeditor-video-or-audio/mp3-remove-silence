name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.check_release.outputs.new_release }}
      version: ${{ steps.check_release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          echo "prev_tag=${PREV:-none}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if new release was created
        id: check_release
        run: |
          git fetch --tags --force 2>/dev/null || true
          CURRENT=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          PREV="${{ steps.prev_tag.outputs.prev_tag }}"
          if [ "$CURRENT" != "$PREV" ] && [ -n "$CURRENT" ]; then
            echo "new_release=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
          else
            echo "new_release=false" >> $GITHUB_OUTPUT
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
          fi

  publish:
    name: Publish Docker
    needs: [release]
    if: needs.release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set version
        run: echo "VERSION=${{ needs.release.outputs.version }}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/mp3-remove-silence:latest
            ghcr.io/${{ github.repository_owner }}/mp3-remove-silence:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: [publish, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest
        run: git pull --rebase origin main

      - name: Update helm
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/mp3-remove-silence:${VERSION}"
          [ -f helm/values.yaml ] && sed -i "s|version: .*|version: ${VERSION}|;s|image: ghcr.io/.*/mp3-remove-silence:.*|image: ${IMAGE}|" helm/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values.yaml 2>/dev/null || true
          if ! git diff --staged --quiet 2>/dev/null; then
            git commit -m "chore: update helm to ${{ needs.release.outputs.version }} [skip ci]"
            git push origin main
          fi
